{%load static%}
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>Cart page</title>
    <style>
        section{
            display:grid;
		grid-template-columns:repeat(3,1fr);
		gap:70px;
		margin:40px 40px;
        }
        .cart-item{
            border: 7px double black;
            max-width: 100%;
            width: fit-content;
            max-height: 100%;
            height: fit-content;
            background-color: black;
            color: white;
            border-radius: 20px;
        }
        .cart-item img{
           position: relative;
           width: 300px;
           height: 250px;
           left: 0px;
           top:20px;
           border-radius:50%;
           object-fit: fill;
        }
        .cart-item h4{
            text-transform: capitalize;
            text-align: center;
            font-family: Arial, Helvetica, sans-serif;
        }
        .cart-item a{
            text-decoration: none;
            color: rgb(243, 240, 240);
            margin-left: 35px;
            text-transform: uppercase;
        }
        .cart-item p{
            display: flex;
            justify-content: center;
        }
        #back{
            display: flex;
            justify-content: end;
            color: black;
        }
    </style>
</head>
<body>
    <a id="back" href="{%url 'products' 'men'%}">Back</a>
    <section>
    {% for item in items %}
        <div class="cart-item">
            <img src="{{item.product.image.url}}"  alt="{{item.product.name}}" width="80">
            <h4>{{item.product.name}}</h4>
            <p>{{item.product.price}}</p>
            <a href="{%url 'increase' item.id %}"><button>+</button></a>
            <span style="position:relative;left:20px;">{{item.quantity}}</span>
            <a href="{%url 'decrease' item.id %}"><button>-</button></a>
            <a href="{%url 'remove' item.id %}">delete</a>
            <form method="post" action="{% url 'place_order' %}">
                {% csrf_token %}
                <button type="submit">Place Order</button>
            </form>    
        </div>
        {%empty%}
        <h1>Cart is empty</h1>
    {% endfor %}
        </section>
</body>
</html>
